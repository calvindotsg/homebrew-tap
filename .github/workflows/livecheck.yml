name: livecheck
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: Homebrew/actions/setup-homebrew@main
      - uses: dawidd6/action-homebrew-bump-formula@v5
        with:
          token: ${{ secrets.CALVINDOTSG_TAP_LIVECHECK_PAT }}
          no_fork: true
          formula: |
            calvindotsg/tap/opensrc
          livecheck: true
